# Alembic Configuration
# =======================

[alembic]
# path to migration scripts
script_location = migrations

# prepend the current directory to the path
# when importing the app modules
prepend_sys_path = .

# Sets the type of version identifier to use
version_path_separator = os

# Logging configuration
# path to mako.template for use with 'revision --autogenerate'
# can be empty

# sqlalchemy.url is set dynamically in env.py
sqlalchemy.url = driver://user:pass@localhost/dbname


# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

[post_write_hooks]
