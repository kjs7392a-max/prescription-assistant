<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>의사 모니터 · 처방 보조</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💊</text></svg>" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" />
<link rel="stylesheet" href="style.css" />
<style>
  html, body { height: 100%; }
  body { display: flex; flex-direction: column; }
  .page { flex: 1; padding: 10px 12px; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; }

  .queue-bar {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 10px; background: var(--surface);
    border: 1px solid var(--border); border-radius: 8px;
    overflow-x: auto; white-space: nowrap;
  }
  .queue-pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 5px 10px; border-radius: 16px;
    background: #fff; border: 1px solid var(--border);
    font-size: 11.5px; cursor: pointer; flex-shrink: 0;
  }
  .queue-pill.active { background: var(--blue-600); color: #fff; border-color: var(--blue-600); font-weight: 700; }
  .queue-pill .n {
    width: 18px; height: 18px; border-radius: 50%;
    background: var(--blue-50); color: var(--blue-700);
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 800;
  }
  .queue-pill.active .n { background: #fff; color: var(--blue-700); }

  .patient-head {
    display: flex; flex-wrap: wrap; align-items: center; gap: 6px 12px;
    padding: 10px 12px; background: var(--surface);
    border: 1px solid var(--border); border-radius: 8px;
  }
  .patient-head .name { font-size: 15px; font-weight: 800; color: var(--text); }
  .patient-head .meta { font-size: 11.5px; color: var(--text-dim); }
  .patient-head .tag {
    padding: 2px 7px; font-size: 10.5px; font-weight: 700;
    border-radius: 3px; white-space: nowrap;
  }
  .patient-head .tag.red { background: var(--red-bg); color: var(--red); border: 1px solid #f3bebb; }
  .patient-head .tag.orange { background: var(--orange-bg); color: var(--orange); border: 1px solid #f3c898; }
  .patient-head .tag.blue { background: var(--blue-50); color: var(--blue-700); border: 1px solid var(--blue-200); }

  .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  @media (max-width: 720px) { .info-grid { grid-template-columns: 1fr; } }
  .info-block {
    background: var(--surface);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 9px 12px;
  }
  .info-block h3 {
    margin: 0 0 6px; font-size: 11px; font-weight: 700;
    color: var(--text-muted); letter-spacing: 0.05em; text-transform: uppercase;
  }
  .info-block .content { font-size: 12.5px; color: var(--text-dim); line-height: 1.55; }
  .lab-row { display: flex; justify-content: space-between; padding: 3px 0; font-size: 12px; }
  .lab-row .name { color: var(--text-muted); }
  .lab-row .val { font-weight: 700; color: var(--text); font-family: "JetBrains Mono", monospace; }
  .lab-row .val.low { color: var(--orange); }
  .lab-row .val.high { color: var(--red); }

  /* 진단+처방전 2분할 */
  .two-col {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px; align-items: stretch;
  }
  @media (max-width: 720px) { .two-col { grid-template-columns: 1fr; } }

  .note-panel, .rx-panel {
    border: 1px solid var(--border); border-radius: 8px;
    overflow: hidden; display: flex; flex-direction: column;
  }
  .note-panel { background: var(--surface); }
  .rx-panel   { background: var(--surface-2); }

  .note-panel textarea {
    flex: 1; width: 100%; border: none;
    padding: 10px 12px; resize: none; min-height: 130px;
    font-size: 13px; font-family: inherit; background: transparent;
  }
  .note-panel textarea:focus { outline: none; background: #fcfdfe; }

  .note-footer {
    display: flex; align-items: center; justify-content: space-between;
    padding: 5px 8px 5px 10px; background: var(--surface-2);
    border-top: 1px solid var(--border); font-size: 10.5px; color: var(--text-muted);
  }
  .btn-save {
    padding: 4px 14px; font-size: 11px; font-weight: 700;
    background: var(--blue-600); color: #fff;
    border: none; border-radius: 5px; cursor: pointer; transition: background 0.15s;
  }
  .btn-save:hover { background: var(--blue-700); }
  .btn-save.saved { background: var(--green); }

  .rx-content {
    flex: 1; margin: 0; padding: 10px 12px;
    font-family: "JetBrains Mono", monospace; font-size: 12px;
    white-space: pre-wrap; color: var(--text-dim); line-height: 1.65;
    overflow-y: auto;
  }
  .rx-empty {
    flex: 1; display: flex; align-items: center; justify-content: center;
    text-align: center; color: var(--text-muted); font-size: 11.5px;
    line-height: 1.7; padding: 20px;
  }


  .analysis-head {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 12px; background: var(--surface-2);
    border-bottom: 1px solid var(--border);
  }
  .analysis-head .badge {
    padding: 3px 8px; font-size: 10.5px; font-weight: 700;
    border-radius: 3px; color: #fff;
  }
  .drug-row {
    display: grid; grid-template-columns: 65px 1fr; gap: 10px;
    padding: 9px 12px; align-items: start;
    border-bottom: 1px solid var(--divider);
  }
  .drug-row:last-child { border-bottom: none; }
  .drug-row .main { min-width: 0; }
  .drug-row .name-line { font-weight: 700; font-size: 13.5px; color: var(--text); }
  .drug-row .name-line .spec {
    font-weight: 400; font-size: 11.5px; color: var(--text-muted); margin-left: 6px;
  }
  .drug-row .findings { margin-top: 4px; display: flex; flex-direction: column; gap: 3px; }
  .drug-row .finding { font-size: 11.5px; color: var(--text-dim); }
  .drug-row .finding .ev { color: var(--text-muted); font-size: 10.5px; margin-left: 4px; }

  .rec-item { padding: 10px 12px; border-bottom: 1px solid var(--divider); }
  .rec-item:last-child { border-bottom: none; }
  .rec-target { font-size: 12px; color: var(--text-dim); margin-bottom: 6px; }
  .rec-target b { color: var(--red); }
  .rec-opt {
    display: flex; align-items: start; gap: 10px;
    padding: 7px 10px; background: var(--surface-2);
    border: 1px solid var(--border-soft); border-radius: 5px;
    margin-top: 5px;
  }
  .rec-opt.first { border-color: var(--green); background: var(--green-bg); }
  .rec-opt .rank {
    padding: 2px 8px; font-size: 10.5px; font-weight: 700;
    border-radius: 3px; color: #fff; white-space: nowrap;
  }
  .rec-opt.first .rank { background: var(--green); }
  .rec-opt.second .rank { background: var(--blue-600); }
  .rec-opt .body { flex: 1; font-size: 12px; }
  .rec-opt .body .nm { font-weight: 700; color: var(--text); }
  .rec-opt .body .dose { color: var(--text-muted); font-family: "JetBrains Mono", monospace; font-size: 11px; margin-left: 4px; }
  .rec-opt .body .why { font-size: 11px; color: var(--text-dim); margin-top: 2px; }

  .sev-summary { display: flex; gap: 4px; flex-wrap: wrap; }
  .sev-summary .s {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 8px; border-radius: 3px; font-size: 10.5px; font-weight: 700;
    color: #fff; white-space: nowrap;
  }
  .sev-summary .s b { font-size: 12px; }

  .empty-hero { text-align: center; padding: 40px 20px; color: var(--text-muted); }
  .empty-hero .icon { font-size: 36px; margin-bottom: 10px; opacity: 0.5; }

  /* 신호등 종합 위험도 카드 */
  .risk-summary-card {
    display: flex; align-items: stretch; gap: 0;
    border: 1px solid var(--border); border-radius: 8px; overflow: hidden;
  }
  .traffic-light {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 5px; padding: 14px 16px;
    background: #1a2332; flex-shrink: 0; min-width: 54px;
  }
  .tl-dot {
    width: 18px; height: 18px; border-radius: 50%;
    background: rgba(255,255,255,0.12);
  }
  .tl-dot.on-red    { background: var(--red);    box-shadow: 0 0 8px var(--red); }
  .tl-dot.on-orange { background: var(--orange);  box-shadow: 0 0 8px var(--orange); }
  .tl-dot.on-yellow { background: var(--yellow);  box-shadow: 0 0 8px var(--yellow); }
  .tl-dot.on-green  { background: var(--green);   box-shadow: 0 0 8px var(--green); }

  .risk-body { flex: 1; padding: 10px 14px; background: var(--surface); }
  .risk-headline { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .risk-label { font-size: 14px; font-weight: 800; }
  .risk-label.critical { color: var(--red); }
  .risk-label.high     { color: var(--orange); }
  .risk-label.warn     { color: var(--yellow); }
  .risk-label.ok       { color: var(--green); }
  .risk-counts { display: flex; gap: 5px; flex-wrap: wrap; }
  .risk-counts .rc {
    padding: 2px 7px; border-radius: 3px; font-size: 10.5px; font-weight: 700; color: #fff;
  }

  .ddi-section { margin-top: 8px; border-top: 1px solid var(--divider); padding-top: 8px; }
  .ddi-title { font-size: 10.5px; font-weight: 700; color: var(--text-muted); letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 5px; }
  .ddi-item {
    display: flex; align-items: baseline; gap: 7px;
    padding: 4px 0; border-bottom: 1px dashed var(--divider); font-size: 11.5px;
  }
  .ddi-item:last-child { border-bottom: none; }
  .ddi-pair { font-weight: 700; color: var(--text); white-space: nowrap; }
  .ddi-reason { color: var(--text-dim); line-height: 1.4; flex: 1; }
  .ddi-ev { font-size: 10.5px; color: var(--text-muted); white-space: nowrap; }

  /* GDMT 단계별 가이드라인 권고 */
  .gdmt-item {
    padding: 10px 12px; border-bottom: 1px solid var(--divider);
    display: flex; gap: 10px; align-items: flex-start;
  }
  .gdmt-item:last-child { border-bottom: none; }
  .gdmt-left { flex-shrink: 0; display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .gdmt-p {
    width: 28px; height: 28px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 800; color: #fff; flex-shrink: 0;
  }
  .gdmt-p.p1 { background: var(--blue-700, #1555a0); }
  .gdmt-p.p2 { background: var(--blue-600); }
  .gdmt-p.p3 { background: var(--text-muted); }
  .gdmt-p.p4 { background: var(--orange); }
  .gdmt-p.p5 { background: #7c3aed; }   /* 정신과 — 보라 */

  /* GDMT 단계 의미 범례 */
  .gdmt-legend {
    display: flex; flex-wrap: wrap; gap: 6px 12px;
    padding: 8px 12px; background: #f8fafc;
    border-bottom: 1px solid var(--border-soft);
    font-size: 10.5px; color: var(--text-dim); line-height: 1.4;
  }
  .gdmt-legend .lg-item { display: inline-flex; align-items: center; gap: 5px; }
  .gdmt-legend .lg-item b { color: var(--text); font-weight: 800; }
  .gdmt-legend .lg-dot {
    width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
  }
  .gdmt-legend .lg-dot.p1 { background: var(--blue-700, #1555a0); }
  .gdmt-legend .lg-dot.p2 { background: var(--blue-600); }
  .gdmt-legend .lg-dot.p3 { background: var(--text-muted); }
  .gdmt-legend .lg-dot.p4 { background: var(--orange); }
  .gdmt-legend .lg-dot.p5 { background: #7c3aed; }

  /* [🔄 재분석] 버튼 — AI 카드 우측 상단 */
  .btn-reanalyze {
    margin-left: auto; padding: 4px 10px; font-size: 11px; font-weight: 700;
    background: #fff; color: var(--blue-700);
    border: 1px solid var(--blue-200); border-radius: 4px;
    cursor: pointer; transition: all 0.12s;
  }
  .btn-reanalyze:hover { background: var(--blue-50); border-color: var(--blue-600); }
  .btn-reanalyze:active { transform: translateY(1px); }
  .btn-reanalyze:disabled { opacity: 0.4; cursor: not-allowed; }

  /* 각 GDMT 항목 좌측 컬럼의 단계 의미 텍스트 */
  .gdmt-meaning {
    margin-top: 4px; font-size: 10px; font-weight: 600;
    color: var(--text-muted); line-height: 1.3;
    text-align: center; max-width: 70px;
  }
  .gdmt-spec { font-size: 9.5px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.03em; white-space: nowrap; }
  .gdmt-body { flex: 1; min-width: 0; }
  .gdmt-guide { font-size: 10px; color: var(--blue-600); font-weight: 700; margin-bottom: 3px; }
  .gdmt-drug { font-size: 12.5px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
  .gdmt-drug .action { font-size: 10px; font-weight: 600; color: #fff; background: var(--blue-600); border-radius: 3px; padding: 1px 5px; margin-right: 5px; vertical-align: middle; }
  .gdmt-reason { font-size: 11px; color: var(--text-dim); line-height: 1.5; }

  /* Clinical Evidence 접기/펼치기 블록 */
  details.ev-block { margin-top: 5px; }
  details.ev-block > summary {
    font-size: 10.5px; font-weight: 700; color: var(--blue-600);
    cursor: pointer; user-select: none; list-style: none;
    display: inline-flex; align-items: center; gap: 3px;
  }
  details.ev-block > summary::-webkit-details-marker { display: none; }
  details.ev-block > summary::before { content: "▶"; font-size: 8px; display: inline-block; transition: transform 0.15s; }
  details.ev-block[open] > summary::before { transform: rotate(90deg); }
  .ev-body {
    background: var(--blue-50, #edf5ff); border: 1px solid var(--blue-200, #bee3f8);
    border-radius: 4px; padding: 7px 10px; margin-top: 4px; font-size: 11px; line-height: 1.55;
  }
  .ev-rationale { margin: 0 0 5px; color: var(--text-dim); }
  .ev-refs { margin: 0; padding: 0; list-style: none; }
  .ev-refs li { color: var(--text-muted); font-size: 10.5px; }
  .ev-refs li + li { margin-top: 2px; }
  .ev-refs a { color: var(--blue-600); text-decoration: none; }
  .ev-refs a:hover { text-decoration: underline; }

  /* AI 처방 권고 (inference) */
  .infer-item {
    display: flex; gap: 10px; padding: 10px 12px;
    border-bottom: 1px solid var(--divider); align-items: flex-start;
  }
  .infer-item:last-of-type { border-bottom: none; }
  .infer-item.first { background: var(--green-bg); border-left: 3px solid var(--green); }
  .infer-item.second { background: var(--blue-50); border-left: 3px solid var(--blue-600); }
  .infer-rank { flex-shrink: 0; display: flex; flex-direction: column; gap: 4px; align-items: center; width: 52px; }
  .infer-rank .rank {
    padding: 2px 0; font-size: 10.5px; font-weight: 700; border-radius: 3px;
    color: #fff; white-space: nowrap; text-align: center; width: 100%;
  }
  .infer-item.first  .rank { background: var(--green); }
  .infer-item.second .rank { background: var(--blue-600); }
  .infer-item.other  .rank { background: var(--text-muted); }
  .risk-lv {
    font-size: 9.5px; font-weight: 700; padding: 1px 4px;
    border-radius: 3px; text-align: center; width: 100%;
  }
  .risk-lv.risk-low      { background: var(--green-bg); color: var(--green); border: 1px solid var(--green); }
  .risk-lv.risk-moderate { background: var(--orange-bg); color: var(--orange); border: 1px solid var(--orange); }
  .risk-lv.risk-high     { background: var(--red-bg); color: var(--red); border: 1px solid var(--red); }
  .infer-body { flex: 1; min-width: 0; }
  .infer-drug { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 3px; }
  .infer-drug .en { font-size: 11px; font-weight: 400; color: var(--text-muted); margin-left: 4px; }
  .infer-drug .strength { font-family: "JetBrains Mono", monospace; font-size: 11px; color: var(--text-dim); margin-left: 4px; }
  .infer-drug .freq { font-size: 10.5px; font-weight: 600; color: var(--blue-600); margin-left: 6px; background: var(--blue-50); padding: 1px 6px; border-radius: 3px; }
  .infer-rationale { font-size: 11.5px; color: var(--text-dim); line-height: 1.5; margin-bottom: 3px; }
  .infer-guide { font-size: 10.5px; color: var(--blue-600); font-weight: 600; }
  .infer-warn  { font-size: 10.5px; color: var(--orange); margin-top: 3px; }
  .infer-loading { text-align: center; padding: 28px 20px; color: var(--text-muted); font-size: 12.5px; }
  .infer-loading .spinner { font-size: 28px; display: block; margin-bottom: 8px; animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .infer-lab { padding: 10px 12px; border-top: 1px solid var(--divider); font-size: 11.5px; color: var(--text-dim); }
  .overall-risk {
    display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 10.5px; font-weight: 700; margin-left: 8px;
  }
  .overall-risk.low      { background: var(--green-bg); color: var(--green); }
  .overall-risk.moderate { background: var(--yellow-bg); color: var(--yellow); }
  .overall-risk.high     { background: var(--orange-bg); color: var(--orange); }
  .overall-risk.critical { background: var(--red-bg); color: var(--red); }

  /* 복합 처방 세트 카드 */
  .rx-set-header {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 14px; background: linear-gradient(135deg, var(--blue-900), var(--blue-700));
    color: #fff;
  }
  .rx-set-header .title { font-size: 13px; font-weight: 800; flex: 1; }
  .rx-set-risk {
    padding: 3px 10px; border-radius: 4px; font-size: 10.5px; font-weight: 700;
    border: 1px solid rgba(255,255,255,0.3);
  }
  .rx-set-risk.low      { background: rgba(42,133,87,0.6); }
  .rx-set-risk.moderate { background: rgba(200,151,18,0.6); }
  .rx-set-risk.high     { background: rgba(217,123,43,0.6); }
  .rx-set-risk.critical { background: rgba(196,62,62,0.7); }

  .rx-set-drug {
    display: grid; grid-template-columns: 32px 1fr auto; gap: 8px;
    padding: 10px 14px; border-bottom: 1px solid var(--divider); align-items: start;
  }
  .rx-set-drug:last-of-type { border-bottom: none; }
  .rx-set-num {
    width: 26px; height: 26px; border-radius: 50%;
    background: var(--blue-600); color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 800; flex-shrink: 0; margin-top: 1px;
  }
  .rx-set-main { min-width: 0; }
  .rx-set-name { font-size: 13.5px; font-weight: 800; color: var(--text); }
  .rx-set-name .en  { font-size: 11px; font-weight: 400; color: var(--text-muted); margin-left: 5px; }
  .rx-set-dose { font-family: "JetBrains Mono", monospace; font-size: 12px; color: var(--blue-700); font-weight: 600; margin-top: 1px; }
  .rx-set-rationale { font-size: 11px; color: var(--text-dim); margin-top: 3px; line-height: 1.45; }
  .rx-set-guide { font-size: 10px; color: var(--blue-600); font-weight: 600; margin-top: 2px; }
  .rx-set-adj {
    font-size: 10.5px; color: var(--orange); margin-top: 3px; padding: 2px 6px;
    background: var(--orange-bg); border-radius: 3px; display: inline-block;
  }
  .rx-set-warn { font-size: 10px; color: var(--red); margin-top: 2px; }
  .rx-set-badge {
    padding: 3px 8px; border-radius: 3px; font-size: 10px; font-weight: 700;
    white-space: nowrap; align-self: start; flex-shrink: 0;
  }
  .rx-set-badge.low      { background: var(--green-bg);   color: var(--green); border: 1px solid var(--green); }
  .rx-set-badge.moderate { background: var(--yellow-bg);  color: var(--yellow); border: 1px solid var(--yellow); }
  .rx-set-badge.high     { background: var(--orange-bg);  color: var(--orange); border: 1px solid var(--orange); }
  .rx-set-badge.critical { background: var(--red-bg);     color: var(--red);    border: 1px solid var(--red); }

  /* Fast-Track / Skeleton UI */
  .fast-track {
    border: 1px dashed var(--blue-600); border-radius: 8px;
    background: #f0f7ff; padding: 10px 12px; margin-bottom: 10px;
  }
  .fast-track .ft-title {
    font-size: 11px; font-weight: 800; color: var(--blue-700);
    letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 6px;
    display: flex; align-items: center; gap: 6px;
  }
  .fast-track .ft-title .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--green); animation: pulse 1.2s infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
  .ft-section { margin-top: 6px; }
  .ft-section h4 {
    margin: 0 0 4px; font-size: 10.5px; font-weight: 700; color: var(--text-muted);
  }
  .ft-chip {

<script>
  let activeId = null;
  let currentNote = "";
  let inferenceResult  = null;
  let inferenceLoading = false;
  let inferenceError   = null;
  let detailsOpen      = false;
  let fastTrack        = null;
  let deepStreamText   = "";
  let partialResult    = null;      // 스트리밍 중 progressive 파싱 결과
  let deadlineElapsed  = false;
  let streamAbort      = null;

  /**
   * 부분 JSON 파서 — 스트리밍 중 미완성 텍스트에서 표준 6필드를 추출.
   * 첫 토큰이 도착하자마자 core 등을 화면에 표시하기 위함.
   */
  function extractPartial(text) {
    const m = text.match(/\{[\s\S]*/);
    if (!m) return null;
    const buf = m[0];
    const out = {};

    // core: "..."
    const coreMatch = buf.match(/"core"\s*:\s*"((?:\\.|[^"\\])*)"/);
    if (coreMatch) out.core = coreMatch[1].replace(/\\"/g, '"').replace(/\\n/g, " ");

    // recommendation_set.primary: [ {generic_name_ko, strength, frequency, form_description, category, note} ]
    const primaryMatch = buf.match(/"primary"\s*:\s*\[([\s\S]*?)(?:\](?=\s*[,}])|$)/);
    if (primaryMatch) {
      out.recommendation_set = out.recommendation_set || { primary: [], secondary: [] };
      const objRe = /\{[^{}]*\}/g;
      let mo;
      while ((mo = objRe.exec(primaryMatch[1]))) {
        try {
          const parsed = JSON.parse(mo[0]);
          if (parsed.generic_name_ko) out.recommendation_set.primary.push(parsed);
        } catch {}
      }
    }
    const secondaryMatch = buf.match(/"secondary"\s*:\s*\[([\s\S]*?)(?:\](?=\s*[,}])|$)/);
    if (secondaryMatch) {
      out.recommendation_set = out.recommendation_set || { primary: [], secondary: [] };
      const objRe = /\{[^{}]*\}/g;
      let mo;
      while ((mo = objRe.exec(secondaryMatch[1]))) {
        try {
          const parsed = JSON.parse(mo[0]);
          if (parsed.generic_name_ko) out.recommendation_set.secondary.push(parsed);
        } catch {}
      }
    }

    // gdmt_steps: [ {step,drug,note}, ... ]
    const stepsMatch = buf.match(/"gdmt_steps"\s*:\s*\[([\s\S]*?)(?:\]|$)/);
    if (stepsMatch) {
      out.gdmt_steps = [];
      const objRe = /\{[^{}]*\}/g;
      let mo;
      while ((mo = objRe.exec(stepsMatch[1]))) {
        try {
          const parsed = JSON.parse(mo[0]);
          if (parsed.drug) out.gdmt_steps.push(parsed);
        } catch {}
      }
    }

    // psychiatric: { detected, drug, consult }
    const psyMatch = buf.match(/"psychiatric"\s*:\s*(\{[^{}]*\})/);
    if (psyMatch) {
      try { out.psychiatric = JSON.parse(psyMatch[1]); } catch {}
    }

    // warnings: [ "...", "..." ]
    const wMatch = buf.match(/"warnings"\s*:\s*\[([\s\S]*?)(?:\]|$)/);
    if (wMatch) {
      out.warnings = [];
      const strRe = /"((?:\\.|[^"\\])*)"/g;
      let ms;
      while ((ms = strRe.exec(wMatch[1]))) out.warnings.push(ms[1]);
    }

    // guidelines: [ "...", "..." ]
    const gMatch = buf.match(/"guidelines"\s*:\s*\[([\s\S]*?)(?:\]|$)/);
    if (gMatch) {
      out.guidelines = [];
      const strRe = /"((?:\\.|[^"\\])*)"/g;
      let ms;
      while ((ms = strRe.exec(gMatch[1]))) out.guidelines.push(ms[1]);
    }

    return out;
  }

  function severityLabel(s) { return { critical:"금기", high:"고위험", warn:"주의", ok:"정상" }[s] || s; }

  async function fetchInference(patient, noteText) {
    if (!patient._dbId) { inferenceError = "환자 DB ID 없음"; renderInference(); return; }
    if (inferenceLoading) {
      if (streamAbort) streamAbort.abort();
    }
    inferenceLoading = true; inferenceResult = null; inferenceError = null;
    fastTrack = null; deepStreamText = ""; partialResult = null; deadlineElapsed = false;
    renderInference();

    // 3초 데드라인 — 경과하면 '상세 분석 중…' 상태 메시지로 전환
    const deadlineTimer = setTimeout(() => {
      if (inferenceLoading && !inferenceResult) {
        deadlineElapsed = true;
        renderInference();
      }
    }, 3000);

    streamAbort = new AbortController();
    try {
      const today = new Date().toISOString().slice(0, 10);
      const res = await fetch("/api/v1/inference/analyze/stream", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ patient_id: patient._dbId, visit_date: today, physician_note: noteText }),
        signal: streamAbort.signal,
      });
      if (!res.ok || !res.body) {
        const txt = await res.text().catch(() => "");
        throw new Error(`${res.status}: ${txt.slice(0, 200)}`);
      }

      const reader  = res.body.getReader();
      const decoder = new TextDecoder("utf-8");
      let buffer = "";
      let currentEvent = "message";

      while (true) {
        const { value, done } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });

        // SSE 프레임 분리 (빈 줄이 구분자)
        let idx;
        while ((idx = buffer.indexOf("\n\n")) !== -1) {
          const frame = buffer.slice(0, idx);
          buffer = buffer.slice(idx + 2);
          const lines = frame.split("\n");
          let evt = "message", data = "";
          for (const ln of lines) {
            if (ln.startsWith("event:")) evt = ln.slice(6).trim();
            else if (ln.startsWith("data:")) data += ln.slice(5).trimStart();
          }
          handleSSE(evt, data);
        }
      }
    } catch (e) {
      if (e.name !== "AbortError") inferenceError = e.message;
    } finally {
      clearTimeout(deadlineTimer);
      inferenceLoading = false;
      renderInference();
      renderAnalysis();
    }
  }

  function handleSSE(evt, data) {
    try {
      if (evt === "fast") {
        fastTrack = JSON.parse(data);
        renderInference();
      } else if (evt === "chunk") {
        deepStreamText += JSON.parse(data);
        // progressive 파싱 — 첫 토큰부터 화면 갱신
        partialResult = extractPartial(deepStreamText);
        renderInference();
      } else if (evt === "result") {
        inferenceResult = JSON.parse(data);
        partialResult = null;
        renderInference();
      } else if (evt === "error") {
        inferenceError = JSON.parse(data);
        renderInference();
      }
    } catch (e) {
      console.warn("SSE parse error:", e, evt, data);
    }
  }

  function renderInference() {
    const el = document.getElementById("inferList");
    if (!el) return;

    if (inferenceError && !inferenceResult) {
      el.innerHTML = `<div class="empty" style="color:var(--red); padding:14px 12px;">오류: ${inferenceError}</div>`;
      return;
    }

    // 데이터 우선순위: 최종 result > 스트리밍 partial > FastTrack만
    const r = inferenceResult || partialResult || {};
    const streaming = inferenceLoading && !inferenceResult;
    const empty = !inferenceLoading && !inferenceResult && !partialResult;

    if (empty) {
      el.innerHTML = `<div class="empty">진단 내용을 입력하고 <b>저장</b>하면 AI 처방 제안이 생성됩니다.</div>`;
      return;
    }

    el.className = `risk-${r.overall_risk || "moderate"} fade-in`;

    // FastTrack 즉시 결과 (eGFR step + 정신과 경고)
    let html = fastTrack ? renderFastTrackCompact(fastTrack) : "";
    html += `<div class="std-box">`;

    // ── [핵심 요약] ──
    const core = r.core || "";
    html += `<div class="std-section">
      <div class="lbl">${streaming ? '<span class="live-dot"></span>' : ""}🎯 핵심 요약</div>
      <div class="std-core ${core ? "" : "empty"}">${core ? escapeHtml(core) : (streaming ? "분석 중…" : "—")}</div>
    </div>`;

    // ── [GDMT 단계] ──
    const steps = r.gdmt_steps || [];
    if (steps.length || streaming) {
      html += `<div class="std-section">
        <div class="lbl">${streaming && steps.length < 4 ? '<span class="live-dot"></span>' : ""}📋 GDMT 단계</div>`;
      if (steps.length) {
        html += `<div class="std-steps">`;
        html += steps.slice(0, 4).map(s => `
          <div class="std-step">
            <div class="num">${s.step || "·"}</div>
            <div class="body">
              <div class="drug">${escapeHtml(s.drug || "")}</div>
              ${s.note ? `<div class="note">${escapeHtml(s.note)}</div>` : ""}
            </div>
          </div>`).join("");
        html += `</div>`;
      } else if (streaming) {
        html += `<div class="std-streaming">단계 생성 중</div>`;
      }
      html += `</div>`;
    }

    // ── [정신과 단계] (조건부) ──
    const psy = r.psychiatric;
    if (psy && psy.detected) {
      html += `<div class="std-psy">
        <div class="lbl-psy">🧠 정신과 단계</div>
        ${psy.drug ? `<div class="drug">${escapeHtml(psy.drug)}</div>` : ""}
        ${psy.consult ? `<div class="consult">${escapeHtml(psy.consult)}</div>` : ""}
      </div>`;
    }

    // ── [주의사항] ──
    const warns = r.warnings || [];
    if (warns.length) {
      html += `<div class="std-section">
        <div class="lbl">⚠️ 주의사항</div>
        <ul class="std-warnings">
          ${warns.slice(0, 3).map(w => `<li>${escapeHtml(w)}</li>`).join("")}
        </ul>
      </div>`;
    }

    // ── [근거] ──
    const guides = r.guidelines || [];
    if (guides.length) {
      html += `<div class="std-section">
        <div class="lbl">📚 근거</div>
        <div class="std-guidelines">
          ${guides.slice(0, 5).map(g => `<span class="gd-chip">${escapeHtml(g)}</span>`).join("")}
        </div>
      </div>`;
    }

    // ── [상세 보기] (최종 result에서만 노출) ──
    const details = inferenceResult?.details;
    const hasDetails = details && (details.guidelines || details.rct || details.notes);
    if (hasDetails) {
      html += `<details class="compact-details" id="compactDetails"${detailsOpen ? " open" : ""}>
        <summary>상세 보기</summary>
        ${details.guidelines ? `<div class="detail-section"><h5>📋 가이드라인</h5><div class="body">${escapeHtml(details.guidelines)}</div></div>` : ""}
        ${details.rct ? `<div class="detail-section"><h5>🧪 RCT · 논문</h5><div class="body">${escapeHtml(details.rct)}</div></div>` : ""}
        ${details.notes ? `<div class="detail-section"><h5>📝 추가 설명</h5><div class="body">${escapeHtml(details.notes)}</div></div>` : ""}
      </details>`;
    }

    html += `</div>`;
    el.innerHTML = html;

    const det = document.getElementById("compactDetails");
    if (det) det.addEventListener("toggle", () => { detailsOpen = det.open; });

    // 스트리밍 중에도 1·2차 추천 영역 동시 갱신 (1초 내 노출)
    if (typeof renderRecommendationSet === "function" && document.getElementById("recList")) {
      renderRecommendationSet();
    }
  }

  function renderFastTrackCompact(ft) {
    const adjs   = ft.dose_adjustments || [];
    const cont   = ft.contraindicated || [];
    const labs   = ft.lab_flags || [];
    const psy    = ft.psychiatric_warnings || [];
    const steps  = ft.egfr_steps || [];
    if (!adjs.length && !cont.length && !labs.length && !psy.length && !steps.length) return "";

    const chip = (txt, cls) => `<span class="ft-chip ${cls}">${escapeHtml(txt)}</span>`;
    return `
      <div class="fast-track fade-in">
        <div class="ft-title"><span class="dot"></span>⚡ 즉시 분석 (0.3초 — eGFR/정신과/금기)</div>
        ${steps.length ? `<div class="ft-section"><h4>💊 eGFR 기반 용량</h4>${steps.map(s => chip(s, "adj")).join("")}</div>` : ""}
        ${psy.length ? `<div class="ft-section"><h4>🧠 정신과 트랙</h4>${psy.map(p => chip(p, "lab")).join("")}</div>` : ""}
        ${cont.length ? `<div class="ft-section"><h4>🚫 즉시 금기</h4>${cont.map(c => chip(c, "cont")).join("")}</div>` : ""}
        ${adjs.length ? `<div class="ft-section"><h4>⚙ 용량 조절</h4>${adjs.map(a => chip(a, "adj")).join("")}</div>` : ""}
        ${labs.length ? `<div class="ft-section"><h4>🧪 Lab 경고</h4>${labs.map(l => chip(l, "lab")).join("")}</div>` : ""}
      </div>`;
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => (
      { "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[c]
    ));
  }

    return `
      <div class="fast-track fade-in">
        <div class="ft-title"><span class="dot"></span>⚡ 즉시 분석 (0.3초 내 · 정규식/사전 기반)</div>

        ${cont.length ? `<div class="ft-section"><h4>🚫 즉시 금기</h4>${cont.map(c => `<span class="ft-chip cont">${escapeHtml(c)}</span>`).join("")}</div>` : ""}
        ${labs.length ? `<div class="ft-section"><h4>🧪 Lab 경고</h4>${labs.map(l => `<span class="ft-chip lab">${escapeHtml(l)}</span>`).join("")}</div>` : ""}

  }

        <div class="analysis-head">
          <span style="font-size:12.5px; font-weight:700;">🏥 GDMT 단계별 가이드라인 권고</span>
          <span class="sub" style="font-size:11px; color:var(--text-muted);">· 분과별 학회 알고리즘 기반 최적 처방 경로</span>
        </div>
        <div class="gdmt-legend">
          <span class="lg-item"><span class="lg-dot p1"></span><b>1단계</b> 핵심 GDMT — 1차 기반 약물 (예: ACEI/ARB)</span>
          <span class="lg-item"><span class="lg-dot p2"></span><b>2단계</b> 추가 GDMT — 표준 병용 (예: β차단제)</span>
          <span class="lg-item"><span class="lg-dot p3"></span><b>3단계</b> 보조 — 위험군 강화 (예: MRA)</span>
          <span class="lg-item"><span class="lg-dot p4"></span><b>4단계</b> 추가 보호 — 장기 합병증 예방 (예: SGLT2i)</span>
          <span class="lg-item"><span class="lg-dot p5"></span><b>5단계</b> 정신건강 — 본원 정신과 처방 (심독성 낮은 항정신병제 우선)</span>
        </div>
        <div id="gdmtList"></div>
      </div>

      <div class="card">
        <div class="analysis-head">
          <span style="font-size:12.5px; font-weight:700;">💡 1·2차 처방 추천</span>
          <span class="sub" style="font-size:11px; color:var(--text-muted);">· 주치료 + 방어제 + 정신과 통합 세트</span>
        </div>
        <div id="recList"></div>
      </div>

      <div class="disclaimer">
        ⓘ 본 프로그램은 참고용 보조 도구이며, 최종 처방 판단과 책임은 의사에게 있습니다.
      </div>
    `;

    const labs = patient.labs || {};
    const labItems = [
      { name: "eGFR", val: labs.eGFR, unit: "mL/min/1.73㎡", flag: labs.eGFR && labs.eGFR < 60 ? "low" : "" },
      { name: "AST/ALT", val: labs.ASTALT, unit: "U/L" },
      { name: "K⁺", val: labs.K, unit: "mmol/L", flag: labs.K && (labs.K < 3.5 || labs.K > 5.0) ? "high" : "" },
      { name: "Na⁺", val: labs.Na, unit: "mmol/L" },
      { name: "QTc", val: labs.QTc, unit: "ms", flag: labs.QTc && labs.QTc > 450 ? "high" : "" },
      { name: "BP", val: labs.BP, unit: "mmHg" },
    ].filter(x => x.val !== null && x.val !== undefined && x.val !== "");

    const labsContent = document.getElementById("labsContent");
    if (labItems.length === 0 && !patient.labNotes) {
      labsContent.innerHTML = '<span style="color:var(--text-muted);">검사결과 미입력</span>';
    } else {
      labsContent.innerHTML = labItems.map(x =>
        `<div class="lab-row"><span class="name">${x.name}</span><span class="val ${x.flag||''}">${x.val} <span style="color:var(--text-muted); font-weight:400; font-size:10px;">${x.unit}</span></span></div>`
      ).join("") + (patient.labNotes ? `<div style="margin-top:6px; padding-top:6px; border-top: 1px dashed var(--border-soft); font-size: 11px;">${patient.labNotes}</div>` : "");
    }

    /* ── 진단 메모 ─────────────────────────────────────── */
    const noteInput = document.getElementById("noteInput");
    const btnSave   = document.getElementById("btnSaveNote");

    async function saveNote() {
      currentNote = noteInput.value;
      if (!currentNote.trim()) return;
      btnSave.textContent = "저장 중…";
      btnSave.disabled = true;
      if (patient._dbId) await RxAssist.patchNote(patient._dbId, currentNote);
      btnSave.textContent = "저장됨 ✓";
      btnSave.classList.add("saved");
      setTimeout(() => {
        btnSave.textContent = "저장";
        btnSave.classList.remove("saved");
        btnSave.disabled = false;
      }, 1500);
      // 진단 내용 저장 → LLM 처방 권고 자동 실행
      fetchInference(patient, currentNote);
    }

    btnSave.addEventListener("click", saveNote);

    // [🔄 재분석] — 메모 재저장 없이 즉시 LLM 재호출
    const btnRe = document.getElementById("btnReanalyze");
    if (btnRe) {
      btnRe.addEventListener("click", () => {
        if (!patient._dbId) return;
        const note = (noteInput && noteInput.value.trim()) || currentNote || patient.note || "";
        if (!note) {
          alert("진단 메모가 비어 있습니다. 먼저 입력해 주세요.");
          return;
        }
        fetchInference(patient, note);
      });
    }


    renderAnalysis();
  }

  function renderRiskSummary(analysis) {
    const el = document.getElementById("riskSummary");
    const card = document.getElementById("riskSummaryCard");
    if (!el) return;

    if (!analysis.drugs.length) { if (card) card.style.display = "none"; return; }
    if (card) card.style.display = "block";

    const risk = analysis.overallRisk || "ok";
    const riskLabel = { critical:"⛔ 금기·절대주의", high:"🔴 고위험", warn:"🟡 주의 요망", ok:"✅ 이상 없음" }[risk] || risk;
    const riskClass = risk;

    // 신호등 dot 클래스
    const tl = {
      critical: ["on-red",   "",          ""],
      high:     ["",          "on-orange", ""],
      warn:     ["",          "on-yellow", ""],
      ok:       ["",          "",          "on-green"],
    }[risk] || ["","",""];

    const { critical=0, high=0, warn=0, ok=0 } = analysis.counts;
    const countBadges = [
      critical ? `<span class="rc" style="background:var(--red);">금기 ${critical}</span>` : "",
      high     ? `<span class="rc" style="background:var(--orange);">고위험 ${high}</span>` : "",
      warn     ? `<span class="rc" style="background:var(--yellow);">주의 ${warn}</span>` : "",
      ok       ? `<span class="rc" style="background:var(--green);">정상 ${ok}</span>` : "",
    ].filter(Boolean).join("");

    const ddiItems = (analysis.ddi || []).map(d => {
      const sevColor = { critical:"var(--red)", high:"var(--orange)", warn:"var(--yellow)" }[d.sev] || "var(--green)";
      return `<div class="ddi-item">
        <span style="color:${sevColor}; font-size:12px; flex-shrink:0;">●</span>
        <span class="ddi-pair">${d.drugA} ↔ ${d.drugB}</span>
        <span class="ddi-reason">${d.reason}</span>
        <span class="ddi-ev">${d.evidence}</span>
        ${evHtml(d.clinical_evidence)}
      </div>`;
    }).join("");

    el.innerHTML = `
      <div class="risk-summary-card">
        <div class="traffic-light">
          <div class="tl-dot ${tl[0]}"></div>
          <div class="tl-dot ${tl[1]}"></div>
          <div class="tl-dot ${tl[2]}"></div>
        </div>
        <div class="risk-body">
          <div class="risk-headline">
            <span class="risk-label ${riskClass}">${riskLabel}</span>
            <div class="risk-counts">${countBadges}</div>
          </div>
          ${ddiItems ? `<div class="ddi-section">
            <div class="ddi-title">⚡ 복합처방 DDI 상호작용 (${analysis.ddi.length}건)</div>
            ${ddiItems}
          </div>` : `<div style="font-size:11.5px; color:var(--text-muted);">처방전 내 약물 간 상호작용 없음</div>`}
        </div>
      </div>`;
  }

  function renderAnalysis() {
    const queue = RxAssist.loadQueue();
    const patient = queue.find(p => p.id === activeId);
    if (!patient) return;
    const analysis = RxAssist.analyze(patient, patient.prescription || "");

    renderRiskSummary(analysis);

    const sum = document.getElementById("sevSummary");
    const counts = analysis.counts;
    const pieces = [];
    if (counts.critical) pieces.push(`<span class="s" style="background:var(--red);">금기 <b>${counts.critical}</b></span>`);
    if (counts.high) pieces.push(`<span class="s" style="background:var(--orange);">고위험 <b>${counts.high}</b></span>`);
    if (counts.warn) pieces.push(`<span class="s" style="background:var(--yellow);">주의 <b>${counts.warn}</b></span>`);
    if (counts.ok) pieces.push(`<span class="s" style="background:var(--green);">정상 <b>${counts.ok}</b></span>`);
    sum.innerHTML = pieces.join("");

    const drugList = document.getElementById("drugList");
    if (analysis.drugs.length === 0) {
      drugList.innerHTML = `<div class="empty">접수 스테이션에서 처방 정보를 입력하면 분석이 표시됩니다.</div>`;
    } else {
      drugList.innerHTML = analysis.drugs.map(x => `
        <div class="drug-row sev-row-${x.sev === 'ok' ? '' : x.sev}">
          <div><span class="sev-badge sev-${x.sev} big">${severityLabel(x.sev)}</span></div>
          <div class="main">
            <div class="name-line">
              ${x.drug.name}
              <span class="spec">${x.drug.strength || ''} ${x.drug.dose || ''}</span>
            </div>
            ${x.findings.length ? `<div class="findings">${x.findings.map(f => `
              <div class="finding">
                <span style="color:var(--${f.sev==='critical'?'red':f.sev==='high'?'orange':'yellow'}); font-weight:700;">●</span>
                ${f.reason}
                <span class="ev">근거 · ${f.evidence}</span>
                ${evHtml(f.clinical_evidence)}
              </div>`).join("")}</div>` : `<div class="findings"><div class="finding" style="color:var(--green);">✓ 특이사항 없음</div></div>`}
          </div>
        </div>`).join("");
    }

    const gdmtList = document.getElementById("gdmtList");
    const localGdmt = analysis.gdmt || [];

    // 정신과 트랙 자동 합성 — fast_track 또는 inferenceResult.psychiatric 감지 시 Step 5 엔트리 추가
    const psyDetected =
      (inferenceResult?.psychiatric?.detected) ||
      (fastTrack?.psychiatric_detected?.length > 0);
    const merged = [...localGdmt];
    if (psyDetected) {
      const psy = inferenceResult?.psychiatric || {};
      const psyDrug = psy.drug || "Aripiprazole 5mg QD 또는 Quetiapine 25mg HS";
      const psyConsult = psy.consult ||
        "심독성 낮은 항정신병제 우선 — 2주 후 재평가, QTc·기립성 저혈압 모니터";

      // 감지된 정신과 증상에 따라 임상 근거 매핑
      const psyTags = fastTrack?.psychiatric_detected || [];
      const ev_refs = [
        { label: "KMAP-CAP 2024 — 우울·조현·조울 약물치료 알고리즘" },
      ];
      if (psyTags.includes("psychosis") || psyTags.includes("agitation")) {
        ev_refs.push({ label: "CATIE — NEJM 2005 (항정신병약 비교)", pmid: "16172203" });
        ev_refs.push({ label: "Aripiprazole 대사·QT 안전성 — Schizophr Res 2008", pmid: "18255267" });
      }
      if (psyTags.includes("depression")) {
        ev_refs.push({ label: "STAR*D — Am J Psychiatry 2006 (SSRI 단계 치료)", pmid: "17074942" });
        ev_refs.push({ label: "Sertraline vs Placebo — Lancet 2009", pmid: "19185342" });
      }
      if (psyTags.includes("insomnia")) {
        ev_refs.push({ label: "Trazodone for insomnia — J Clin Sleep Med 2017", pmid: "28992850" });
      }
      if (psyTags.includes("anxiety")) {
        ev_refs.push({ label: "Escitalopram in GAD — JAMA 2003", pmid: "12851276" });
      }

      const ev_rationale =
        "심독성·대사 부담 낮은 항정신병제(부분 D2 작용제) 또는 SSRI 우선. " +
        "QT 연장·기립성 저혈압·체중 증가 위험 최소화. " +
        "본원 정신과 의사 직접 처방·추적.";

      merged.push({
        priority: 5,
        specialty: "정신과",
        guideline: "KMAP 2024 — 우울·조현병·조울증 가이드라인",
        action: "본원 처방",
        drug: psyDrug,
        reason: psyConsult,
        clinical_evidence: { rationale: ev_rationale, refs: ev_refs },
      });
    }

    // 단계 의미 라벨 — 배지 아래 한 줄
    const stepMeaning = {
      1: "핵심 GDMT (1차 기반)",
      2: "추가 GDMT (표준 병용)",
      3: "보조 (위험군 강화)",
      4: "추가 보호 (합병증 예방)",
      5: "정신건강 (본원 처방)",
    };

    if (merged.length === 0) {
      gdmtList.innerHTML = `<div class="empty">이 환자 프로파일에 해당하는 GDMT 권고가 없거나 이미 모두 처방 중입니다.</div>`;
    } else {
      gdmtList.innerHTML = merged.map(g => `
        <div class="gdmt-item">
          <div class="gdmt-left">
            <div class="gdmt-p p${g.priority}">${g.priority}단계</div>
            <div class="gdmt-spec">${g.specialty.split(" ")[0]}</div>
            <div class="gdmt-meaning">${stepMeaning[g.priority] || ""}</div>
          </div>
          <div class="gdmt-body">
            <div class="gdmt-guide">📋 근거 · ${g.guideline}</div>
            <div class="gdmt-drug"><span class="action">${g.action}</span>${g.drug}</div>
            <div class="gdmt-reason">${g.reason}</div>
            ${evHtml(g.clinical_evidence)}
          </div>
        </div>`).join("");
    }

    renderRecommendationSet();
    renderInference();
  }

  /**
   * [1·2차 처방 추천] — recommendation_set 기반 테이블 렌더 + 처방 확정 버튼.
   * 스트리밍 중 partialResult.recommendation_set.primary가 채워지면 즉시 표시.
   */
  function renderRecommendationSet() {
    const recList = document.getElementById("recList");
    if (!recList) return;

    const r = inferenceResult || partialResult || {};
    const set = r.recommendation_set || { primary: [], secondary: [] };
    const primary = set.primary || [];
    const secondary = set.secondary || [];
    const streaming = inferenceLoading && !inferenceResult;

    if (!primary.length && !secondary.length) {
      recList.innerHTML = streaming
        ? `<div class="empty"><span style="display:inline-block; width:10px; height:10px; border-radius:50%; background:var(--blue-600); animation: pulse 1s infinite; margin-right:6px;"></span>1차 처방 세트 생성 중…</div>`
        : `<div class="empty">진단 내용을 입력하고 저장하면 1·2차 추천이 표시됩니다.</div>`;
      return;
    }

    // Risperidone 감지 — 메모/추천세트/GDMT step 어디든 등장하면 위험 모드
    const rispDetected = detectRisperidone(primary, secondary);

    const isRispItem = (it) => {
      const blob = (it.generic_name_ko + " " + (it.generic_name_en || "")).toLowerCase();
      return /리스페리돈|risperidone|risperdal/i.test(blob);
    };

    const renderTable = (items, blockClass, rankLabel, sub) => {
      if (!items.length) return "";
      const rows = items.map((it) => {
        const cat = it.category || "주치료";
        const riskClass = isRispItem(it) ? " risk-risp" : "";
        return `
          <div class="rx-row${riskClass}">
            <div class="cat-badge ${cat}">${cat}</div>
            <div class="name-col">
              <div class="name">${escapeHtml(it.generic_name_ko)}</div>
              ${it.form_description ? `<div class="form">${escapeHtml(it.form_description)}</div>` : ""}
              ${it.note ? `<div class="row-note">${escapeHtml(it.note)}</div>` : ""}
            </div>
            <div class="dose">${escapeHtml(it.strength || "")}</div>
            <div class="freq">${escapeHtml(it.frequency || "")}</div>
          </div>`;
      }).join("");
      return `
        <div class="rec-set-block ${blockClass}">
          <div class="rs-title">
            <span class="rank">${rankLabel}</span>
            <span>${escapeHtml(sub)}</span>
          </div>
          <div class="rx-table">
            <div class="rx-row head">
              <div>구분</div><div>약물 / 제형</div><div>용량</div><div>복용</div>
            </div>
            ${rows}
          </div>
        </div>`;
    };

    let html = `<div class="rec-set">`;

    // ── Risperidone 위험 알림 배너 (영역 최상단)
    if (rispDetected) {
      const ft = fastTrack?.risperidone_alert || {};
      const headline = ft.headline ||
        "리스페리돈은 QTc 연장 및 기립성 저혈압 위험이 있어 심부전 환자에게 신중 투여가 필요합니다.";
      html += `
        <div class="risp-banner">
          <div class="rb-title"><span class="rb-pill">⚠ 심혈관 위험</span> 리스페리돈 감지</div>
          <div class="rb-msg">⚠️ 주의: ${escapeHtml(headline)}</div>
        </div>`;

      // 대안 약물 제안 카드
      const alts = (ft.alternatives && ft.alternatives.length) ? ft.alternatives : [
        { name: "Aripiprazole", name_ko: "아리피프라졸", dose: "5~10mg QD", reason: "부분 D2 작용제 — QT/대사 부담 최저" },
        { name: "Quetiapine",   name_ko: "쿠에티아핀",   dose: "25~50mg HS", reason: "낮은 EPS — 진정·수면 동반 시 적합" },
      ];
      html += `
        <div class="risp-alt-card">
          <div class="alt-title">더 안전한 대안으로 ${alts.map(a => `${a.name_ko}(${a.name})`).join(" 또는 ")}을(를) 고려하시겠습니까?</div>
          <div class="alt-list">
            ${alts.map(a => `
              <div class="alt-item">
                <span class="nm">${escapeHtml(a.name_ko)}</span>
                <span style="color:var(--text-muted);">·</span>
                <span class="dose">${escapeHtml(a.dose)}</span>
                <span style="color:var(--text-muted);">·</span>
                <span class="reason">${escapeHtml(a.reason)}</span>
              </div>`).join("")}
          </div>
        </div>`;
    }

    html += renderTable(primary, "primary", "1차 추천 세트", "주치료 + 방어제 + 정신과 통합");
    html += renderTable(secondary, "secondary", "2차 대체", "부작용·금기 발생 시 전환");

    // ── Risperidone 처방 강행 시 필수 모니터링 footer
    if (rispDetected) {
      const mon = fastTrack?.risperidone_alert?.monitoring || [
        "처방 전후 심전도(ECG) 검사 시행",
        "기립성 저혈압 발생 여부 밀착 모니터링",
      ];
      html += `
        <div class="risp-monitor">
          <div class="mon-title">🚨 리스페리돈 처방 시 필수 모니터링</div>
          <ul>
            ${mon.map(m => `<li>필수: ${escapeHtml(m)}</li>`).join("")}
          </ul>
        </div>`;
    }

    html += `</div>`;
    recList.innerHTML = html;
  }

  /**
   * Risperidone 감지 — 메모/FastTrack/추천세트/GDMT step 어디서든 등장하면 true.
   */
  function detectRisperidone(primary, secondary) {
    const re = /리스페리돈|risperidone|risperdal/i;

    if (fastTrack?.risperidone_alert) return true;
    if ((currentNote || "").match(re)) return true;

    const items = [...(primary || []), ...(secondary || [])];
    if (items.some(it => re.test((it.generic_name_ko || "") + " " + (it.generic_name_en || "")))) {
      return true;
    }
    const r = inferenceResult || partialResult || {};
    const steps = r.gdmt_steps || [];
    if (steps.some(s => re.test(s.drug || ""))) return true;
    if (re.test(r.psychiatric?.drug || "")) return true;

    return false;
  }

  // noteInput 포커스 중에는 render() 건너뜀 (innerHTML 교체로 textarea 포커스·커서 증발 방지)
  RxAssist.subscribe(() => {
    if (document.activeElement?.id === 'noteInput') return;
    render();
  });
  render();
</script>
</body>
</html>
